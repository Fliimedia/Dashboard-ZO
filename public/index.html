<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Performance OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{
  --paper:#F4F3F6; --ink:#141019; --card:#FFFFFF; --magenta:#E6007E;
  --violet:#3B1E5E; --mist:#6E6879; --line:#E6E3EC; --soft:#F6F4F9;
  --pos:#0E9F6E; --neg:#E0245A;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
#root{min-height:100vh}
.wrap{max-width:1120px;margin:0 auto;padding:0 20px 64px}
.mono{font-family:'IBM Plex Mono',monospace}
.disp{font-family:'Space Grotesk',sans-serif}

/* header */
.top{position:relative;overflow:hidden;border-bottom:1px solid var(--line);background:var(--card)}
.orb{position:absolute;top:-140px;right:-100px;width:340px;height:340px;border-radius:50%;
  background:radial-gradient(circle at 30% 30%, rgba(230,0,126,0.20), rgba(59,30,94,0.10) 55%, rgba(255,255,255,0) 72%);
  filter:blur(6px);pointer-events:none}
.brandrow{display:flex;align-items:center;gap:10px;padding:22px 0 0}
.dot{width:11px;height:11px;border-radius:50%;background:var(--magenta);display:inline-block}
.brand{font-family:'Space Grotesk';font-weight:700;letter-spacing:.01em;font-size:15px}
.brandsub{font-family:'IBM Plex Mono';font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--mist)}
.h1{font-family:'Space Grotesk';font-weight:700;font-size:30px;letter-spacing:-.02em;margin:14px 0 2px}
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;padding:14px 0 20px}
.field label{display:block;font-family:'IBM Plex Mono';font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--mist);margin:0 0 6px}
.field select,.field input{font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);outline:none;min-width:150px}
.field select:focus,.field input:focus{border-color:var(--magenta);box-shadow:0 0 0 3px rgba(230,0,126,.12)}
.period{font-family:'IBM Plex Mono';font-size:11px;color:var(--mist);padding-bottom:3px}

/* tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-top:4px;overflow-x:auto}
.tab{appearance:none;border:none;background:none;font-family:'Space Grotesk';font-weight:600;font-size:15px;color:var(--mist);padding:12px 14px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.on{color:var(--ink);border-bottom-color:var(--magenta)}
.subtabs{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 6px}
.subtab{appearance:none;border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px;font-size:13px;color:var(--ink);cursor:pointer;font-family:inherit}
.subtab.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* cards + grids */
.grid{display:grid;gap:14px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:820px){.g4{grid-template-columns:repeat(2,1fr)}.g3,.g2{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px}
.card h3{font-family:'IBM Plex Mono';font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--magenta);margin:0 0 12px}
.sc .lab{font-family:'IBM Plex Mono';font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--mist)}
.sc .val{font-family:'Space Grotesk';font-weight:700;font-size:27px;letter-spacing:-.01em;margin:6px 0 4px}
.delta{font-family:'IBM Plex Mono';font-size:12px}
.delta.up{color:var(--pos)} .delta.down{color:var(--neg)} .delta.flat{color:var(--mist)}

/* table */
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-family:'IBM Plex Mono';font-weight:500;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--mist);padding:0 8px 8px;border-bottom:1px solid var(--line)}
td{padding:9px 8px;border-bottom:1px solid var(--soft)}
td.num,th.num{text-align:right;font-family:'IBM Plex Mono'}
tr:last-child td{border-bottom:none}

/* bars */
.bar{display:flex;align-items:center;gap:10px;margin:8px 0}
.bar .bl{width:120px;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar .bt{flex:1;height:8px;background:var(--line);border-radius:6px;overflow:hidden}
.bar .bf{height:100%;background:var(--magenta);border-radius:6px}
.bar .bv{width:56px;text-align:right;font-family:'IBM Plex Mono';font-size:12px;color:var(--mist)}

/* misc */
.btn{appearance:none;border:none;background:var(--magenta);color:#fff;font-family:'Space Grotesk';font-weight:600;font-size:14px;padding:11px 18px;border-radius:11px;cursor:pointer}
.btn:disabled{background:var(--violet);cursor:wait}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}
.note{background:var(--soft);border:1px dashed var(--line);border-radius:12px;padding:14px;color:var(--mist);font-size:13px}
.err{background:#fff;border:1px solid var(--line);border-left:3px solid var(--magenta);border-radius:12px;padding:14px;font-size:14px;margin:14px 0}
.pulse{animation:pl 1.1s ease-in-out infinite}
@keyframes pl{0%{box-shadow:0 0 0 0 rgba(230,0,126,.5)}70%{box-shadow:0 0 0 8px rgba(230,0,126,0)}100%{box-shadow:0 0 0 0 rgba(230,0,126,0)}}
.pre{white-space:pre-wrap;font-family:'Inter';font-size:14.5px;line-height:1.6}
.chip{display:inline-block;font-family:'IBM Plex Mono';font-size:11px;padding:3px 8px;border-radius:999px;border:1px solid var(--line);color:var(--mist)}
.opt{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid var(--soft)}
.opt .mk{width:8px;height:8px;border-radius:50%;background:var(--magenta);margin-top:6px;flex:none}
.splash{display:flex;align-items:center;justify-content:center;height:100vh;color:var(--mist);font-family:'IBM Plex Mono';font-size:13px}
@media(prefers-reduced-motion:reduce){.pulse{animation:none}}
</style>
</head>
<body>
<div id="root"><div class="splash">Performance OS laden...</div></div>

<script type="text/babel">
const {useState,useEffect,useMemo} = React;

/* ------------------------------------------------------------------ */
/* Klanten. Vul hier je GA4 property per klant in. name is wat de klant */
/* ziet, id is de GA4 property id (het getal, niet het G-meetnummer).   */
/* ------------------------------------------------------------------ */
const CLIENTS = [
  { name: "Demo", id: "283274237" },
  // { name: "BikeFair", id: "XXXXXXXXX" },
  // { name: "TheaterThuis", id: "XXXXXXXXX" },
];

const RANGES = [
  { id:"7d", label:"7 dagen" },
  { id:"30d", label:"30 dagen" },
  { id:"month", label:"Deze maand" },
  { id:"lastmonth", label:"Vorige maand" },
];

/* ---------- datums ---------- */
function iso(d){ return d.toISOString().slice(0,10); }
function ranges(id){
  const now=new Date();
  let s=new Date(now), e=new Date(now);
  if(id==="7d") s.setDate(now.getDate()-7);
  else if(id==="30d") s.setDate(now.getDate()-30);
  else if(id==="month") s=new Date(now.getFullYear(),now.getMonth(),1);
  else if(id==="lastmonth"){ s=new Date(now.getFullYear(),now.getMonth()-1,1); e=new Date(now.getFullYear(),now.getMonth(),0); }
  const days=Math.max(1,Math.round((e-s)/86400000));
  const ps=new Date(s); ps.setDate(s.getDate()-days-1);
  const pe=new Date(s); pe.setDate(s.getDate()-1);
  return { cur:{startDate:iso(s),endDate:iso(e)}, prev:{startDate:iso(ps),endDate:iso(pe)}, days };
}

/* ---------- GA rapportdefinities ---------- */
function reportDefs(cur,prev){
  const core=[{name:"sessions"},{name:"totalUsers"},{name:"newUsers"},{name:"screenPageViews"},{name:"averageSessionDuration"},{name:"engagementRate"},{name:"bounceRate"}];
  return [
    { dateRanges:[cur], metrics:core },                                                                                   // 0 totals cur
    { dateRanges:[prev], metrics:core },                                                                                  // 1 totals prev
    { dateRanges:[cur], dimensions:[{name:"sessionDefaultChannelGroup"}], metrics:[{name:"sessions"},{name:"totalUsers"},{name:"engagementRate"}], orderBys:[{metric:{metricName:"sessions"},desc:true}], limit:10 }, // 2 channels
    { dateRanges:[cur], dimensions:[{name:"sessionCampaignName"}], metrics:[{name:"sessions"},{name:"totalUsers"}], orderBys:[{metric:{metricName:"sessions"},desc:true}], limit:10 }, // 3 campaigns
    { dateRanges:[cur], dimensions:[{name:"pagePath"}], metrics:[{name:"screenPageViews"},{name:"averageSessionDuration"}], orderBys:[{metric:{metricName:"screenPageViews"},desc:true}], limit:10 }, // 4 pages
    { dateRanges:[cur], dimensions:[{name:"deviceCategory"}], metrics:[{name:"sessions"}], orderBys:[{metric:{metricName:"sessions"},desc:true}] }, // 5 devices
    { dateRanges:[cur], dimensions:[{name:"date"}], metrics:[{name:"sessions"},{name:"totalUsers"}], orderBys:[{dimension:{dimensionName:"date"}}] }, // 6 trend
    { dateRanges:[cur], dimensions:[{name:"country"}], metrics:[{name:"sessions"}], orderBys:[{metric:{metricName:"sessions"},desc:true}], limit:8 }, // 7 country
  ];
}

const n = v => { const x=Number(v||0); return isNaN(x)?0:x; };
function rows(r){ return (r&&r.rows)||[]; }
function totalsOf(r){ const rr=rows(r); const m=rr[0]?rr[0].metricValues.map(x=>n(x.value)):[0,0,0,0,0,0,0];
  return {sessions:m[0],users:m[1],newUsers:m[2],views:m[3],avgDur:m[4],engRate:m[5],bounceRate:m[6]}; }

function parse(data){
  const R=(data&&data.reports)||[];
  const cur=totalsOf(R[0]), prev=totalsOf(R[1]);
  const channels=rows(R[2]).map(x=>({name:x.dimensionValues[0].value||"(niet ingesteld)",sessions:n(x.metricValues[0].value),users:n(x.metricValues[1].value),eng:n(x.metricValues[2].value)}));
  const campaigns=rows(R[3]).map(x=>({name:x.dimensionValues[0].value||"(niet ingesteld)",sessions:n(x.metricValues[0].value),users:n(x.metricValues[1].value)}));
  const pages=rows(R[4]).map(x=>({path:x.dimensionValues[0].value,views:n(x.metricValues[0].value),dur:n(x.metricValues[1].value)}));
  const devices=rows(R[5]).map(x=>({name:x.dimensionValues[0].value,sessions:n(x.metricValues[0].value)}));
  const trend=rows(R[6]).map(x=>({date:x.dimensionValues[0].value,sessions:n(x.metricValues[0].value),users:n(x.metricValues[1].value)}));
  const countries=rows(R[7]).map(x=>({name:x.dimensionValues[0].value,sessions:n(x.metricValues[0].value)}));
  return {cur,prev,channels,campaigns,pages,devices,trend,countries};
}

/* ---------- formatters ---------- */
const int = v => Math.round(v).toLocaleString("nl-NL");
const pct = v => (v*100).toFixed(1).replace(".",",")+"%";
function dur(s){ s=Math.round(s); const m=Math.floor(s/60); return m+"m "+String(s%60).padStart(2,"0")+"s"; }
function delta(cur,prev){ if(!prev) return {t:"", cls:"flat"}; const d=(cur-prev)/prev*100; const cls=d>0.5?"up":d<-0.5?"down":"flat"; const sign=d>0?"+":""; return {t:sign+d.toFixed(1).replace(".",",")+"%", cls}; }
function niceDate(s){ if(!s||s.length!==8) return s; return s.slice(6,8)+"-"+s.slice(4,6); }

/* ---------- kleine SVG grafieken ---------- */
function Line({series,height=140}){
  const w=560, h=height, pad=6;
  const all=series.flatMap(s=>s.data);
  const max=Math.max(...all,1);
  const cols=["var(--magenta)","var(--violet)"];
  const line=(data)=>{ if(data.length<2) return ""; const step=(w-pad*2)/(data.length-1);
    return data.map((v,i)=> (pad+i*step)+","+(h-pad-(v/max)*(h-pad*2))).join(" "); };
  return (
    <svg viewBox={"0 0 "+w+" "+h} preserveAspectRatio="none" style={{width:"100%",height:h}}>
      {series.map((s,i)=>(
        <React.Fragment key={i}>
          <polyline points={line(s.data)} fill="none" stroke={cols[i%2]} strokeWidth="2.4" strokeLinejoin="round"/>
        </React.Fragment>
      ))}
    </svg>
  );
}
function Donut({segments,size=150}){
  const total=segments.reduce((a,b)=>a+b.value,0)||1;
  const cols=["var(--magenta)","var(--violet)","#9B6AC9","#C9A2E8","#E6E3EC"];
  const R=size/2, r=R*0.62; let ang=-Math.PI/2;
  const arc=(frac)=>{ const a2=ang+frac*Math.PI*2;
    const x1=R+R*Math.cos(ang), y1=R+R*Math.sin(ang), x2=R+R*Math.cos(a2), y2=R+R*Math.sin(a2);
    const xi2=R+r*Math.cos(a2), yi2=R+r*Math.sin(a2), xi1=R+r*Math.cos(ang), yi1=R+r*Math.sin(ang);
    const large=frac>0.5?1:0; ang=a2;
    return "M "+x1+" "+y1+" A "+R+" "+R+" 0 "+large+" 1 "+x2+" "+y2+" L "+xi2+" "+yi2+" A "+r+" "+r+" 0 "+large+" 0 "+xi1+" "+yi1+" Z"; };
  return (
    <div style={{display:"flex",gap:16,alignItems:"center",flexWrap:"wrap"}}>
      <svg viewBox={"0 0 "+size+" "+size} style={{width:size,height:size}}>
        {segments.map((s,i)=><path key={i} d={arc(s.value/total)} fill={cols[i%cols.length]}/>)}
      </svg>
      <div>
        {segments.map((s,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,margin:"5px 0",fontSize:13}}>
            <span style={{width:10,height:10,borderRadius:3,background:cols[i%cols.length],display:"inline-block"}}/>
            <span style={{minWidth:90}}>{s.label}</span>
            <span className="mono" style={{color:"var(--mist)"}}>{int(s.value)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}
function Bars({items,valKey="sessions"}){
  const top=Math.max(...items.map(i=>i[valKey]),1);
  return items.map((c,i)=>(
    <div className="bar" key={i}>
      <span className="bl">{c.name}</span>
      <span className="bt"><span className="bf" style={{width:(c[valKey]/top)*100+"%"}}/></span>
      <span className="bv">{int(c[valKey])}</span>
    </div>
  ));
}

function Scorecard({label,value,cur,prev}){
  const d=delta(cur,prev);
  return (
    <div className="card sc">
      <div className="lab">{label}</div>
      <div className="val">{value}</div>
      <div className={"delta "+d.cls}>{d.t?d.t+" vs vorige periode":"geen vergelijking"}</div>
    </div>
  );
}
function Table({cols,data,render}){
  return (
    <table>
      <thead><tr>{cols.map((c,i)=><th key={i} className={c.num?"num":""}>{c.label}</th>)}</tr></thead>
      <tbody>{data.map((row,i)=><tr key={i}>{render(row)}</tr>)}</tbody>
    </table>
  );
}

/* ---------- inzichten (berekend) ---------- */
function optimizations(d){
  const out=[];
  if(d.cur.bounceRate>0.6) out.push("Bounce rate is "+pct(d.cur.bounceRate)+". Kijk of de landingspagina's aansluiten op de bron van het verkeer.");
  const avgEng=d.channels.length? d.channels.reduce((a,c)=>a+c.eng,0)/d.channels.length : 0;
  const weak=d.channels.filter(c=>c.sessions>0 && c.eng<avgEng*0.8).sort((a,b)=>b.sessions-a.sessions)[0];
  if(weak) out.push("Kanaal "+weak.name+" brengt veel verkeer ("+int(weak.sessions)+" sessies) maar blijft achter in betrokkenheid ("+pct(weak.eng)+"). Kans om de instroom te verbeteren.");
  const mob=d.devices.find(x=>x.name==="mobile"), tot=d.devices.reduce((a,x)=>a+x.sessions,0)||1;
  if(mob && mob.sessions/tot>0.55) out.push("Ruim de helft van het verkeer is mobiel ("+pct(mob.sessions/tot)+"). Controleer of de mobiele ervaring op orde is.");
  if(d.pages[0]) out.push("Best bezochte pagina is "+d.pages[0].path+" ("+int(d.pages[0].views)+" weergaven). Benut die pagina voor je belangrijkste call to action.");
  const newShare=d.cur.users? d.cur.newUsers/d.cur.users : 0;
  if(newShare>0.7) out.push("Het aandeel nieuwe gebruikers is hoog ("+pct(newShare)+"). Werk aan terugkeer met e-mail of retargeting.");
  else if(newShare<0.3 && d.cur.users>0) out.push("Weinig nieuwe gebruikers ("+pct(newShare)+"). Er komt te weinig nieuw publiek binnen, kijk naar bereik.");
  if(out.length===0) out.push("Geen directe aandachtspunten in de cijfers voor deze periode.");
  return out;
}
function forecast(trend,days){
  const y=trend.map(t=>t.sessions); const nn=y.length;
  if(nn<3) return null;
  const xs=y.map((_,i)=>i); const mx=xs.reduce((a,b)=>a+b,0)/nn; const my=y.reduce((a,b)=>a+b,0)/nn;
  let num=0,den=0; xs.forEach((x,i)=>{num+=(x-mx)*(y[i]-my); den+=(x-mx)*(x-mx);});
  const slope=den?num/den:0; const intc=my-slope*mx;
  let proj=0; for(let i=nn;i<nn+days;i++) proj+=Math.max(0,intc+slope*i);
  const curTotal=y.reduce((a,b)=>a+b,0);
  return { curTotal, proj:Math.round(proj), dir: slope>0.05?"stijgend":slope<-0.05?"dalend":"vlak" };
}

/* ------------------------------------------------------------------ */
function App(){
  const [client,setClient]=useState(()=>{ try{return JSON.parse(localStorage.getItem("pos_client"))||CLIENTS[0];}catch(e){return CLIENTS[0];} });
  const [rangeId,setRangeId]=useState("30d");
  const [tab,setTab]=useState("performance");
  const [sub,setSub]=useState("overzicht");
  const [status,setStatus]=useState("idle");
  const [data,setData]=useState(null);
  const [error,setError]=useState("");

  const rg=useMemo(()=>ranges(rangeId),[rangeId]);

  useEffect(()=>{ localStorage.setItem("pos_client",JSON.stringify(client)); },[client]);
  useEffect(()=>{ load(); },[client,rangeId]);

  async function load(){
    setStatus("loading"); setError(""); setData(null);
    try{
      const res=await fetch("/api/ga",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({propertyId:client.id, reports:reportDefs(rg.cur,rg.prev)})});
      const j=await res.json();
      if(!res.ok) throw new Error(j.error||("status "+res.status));
      setData(parse(j)); setStatus("done");
    }catch(e){ setError(e.message||"Kon geen data laden."); setStatus("error"); }
  }

  const TABS=[["performance","Performance"],["trends","Trends"],["models","Models"],["insights","Insights"]];
  const SUBS=[["overzicht","Overzicht"],["business","Business"],["marketing","Marketing"],["web","Web"]];

  return (
    <div>
      <div className="top">
        <div className="orb"/>
        <div className="wrap">
          <div className="brandrow">
            <span className={"dot"+(status==="loading"?" pulse":"")}/>
            <span className="brand">Performance OS</span>
            <span className="brandsub">by Flii</span>
          </div>
          <div className="h1 disp">{client.name}</div>
          <div className="controls">
            <div className="field">
              <label>Klant</label>
              <select value={client.id} onChange={e=>setClient(CLIENTS.find(c=>c.id===e.target.value)||CLIENTS[0])}>
                {CLIENTS.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <div className="field">
              <label>Periode</label>
              <select value={rangeId} onChange={e=>setRangeId(e.target.value)}>
                {RANGES.map(r=><option key={r.id} value={r.id}>{r.label}</option>)}
              </select>
            </div>
            <span className="period">{rg.cur.startDate} tot {rg.cur.endDate}</span>
          </div>
          <div className="tabs">
            {TABS.map(([id,l])=><button key={id} className={"tab"+(tab===id?" on":"")} onClick={()=>setTab(id)}>{l}</button>)}
          </div>
        </div>
      </div>

      <div className="wrap">
        {status==="error" && <div className="err"><strong style={{color:"var(--magenta)"}}>Er ging iets mis.</strong><div style={{marginTop:6}}>{error}</div><button className="btn ghost" style={{marginTop:12}} onClick={load}>Opnieuw</button></div>}
        {status==="loading" && <p className="mono" style={{color:"var(--mist)",marginTop:24}}>Cijfers laden uit GA4...</p>}

        {data && tab==="performance" && (
          <div>
            <div className="subtabs">
              {SUBS.map(([id,l])=><button key={id} className={"subtab"+(sub===id?" on":"")} onClick={()=>setSub(id)}>{l}</button>)}
            </div>
            {sub==="overzicht" && <Overzicht d={data}/>}
            {sub==="business" && <Business d={data}/>}
            {sub==="marketing" && <Marketing d={data}/>}
            {sub==="web" && <Web d={data}/>}
          </div>
        )}
        {data && tab==="trends" && <Trends d={data} client={client}/>}
        {data && tab==="models" && <Models d={data} days={rg.days}/>}
        {data && tab==="insights" && <Insights d={data} client={client} rg={rg} range={rangeId}/>}
      </div>
    </div>
  );
}

/* ---------- Performance sub-tabs ---------- */
function Overzicht({d}){
  return (
    <div>
      <div className="grid g4">
        <Scorecard label="Sessies" value={int(d.cur.sessions)} cur={d.cur.sessions} prev={d.prev.sessions}/>
        <Scorecard label="Gebruikers" value={int(d.cur.users)} cur={d.cur.users} prev={d.prev.users}/>
        <Scorecard label="Weergaven" value={int(d.cur.views)} cur={d.cur.views} prev={d.prev.views}/>
        <Scorecard label="Betrokkenheid" value={pct(d.cur.engRate)} cur={d.cur.engRate} prev={d.prev.engRate}/>
      </div>
      <div className="grid g2" style={{marginTop:14}}>
        <div className="card"><h3>Sessies en gebruikers</h3><Line series={[{data:d.trend.map(t=>t.sessions)},{data:d.trend.map(t=>t.users)}]}/>
          <div style={{display:"flex",gap:14,marginTop:8,fontSize:12,color:"var(--mist)"}}><span className="mono" style={{color:"var(--magenta)"}}>sessies</span><span className="mono" style={{color:"var(--violet)"}}>gebruikers</span></div>
        </div>
        <div className="card"><h3>Kanalen</h3><Bars items={d.channels.slice(0,6)}/></div>
      </div>
    </div>
  );
}
function Business({d}){
  const returning=Math.max(0,d.cur.users-d.cur.newUsers);
  return (
    <div>
      <div className="grid g4">
        <Scorecard label="Gebruikers" value={int(d.cur.users)} cur={d.cur.users} prev={d.prev.users}/>
        <Scorecard label="Nieuwe gebruikers" value={int(d.cur.newUsers)} cur={d.cur.newUsers} prev={d.prev.newUsers}/>
        <Scorecard label="Gem. sessieduur" value={dur(d.cur.avgDur)} cur={d.cur.avgDur} prev={d.prev.avgDur}/>
        <Scorecard label="Bounce rate" value={pct(d.cur.bounceRate)} cur={d.cur.bounceRate} prev={d.prev.bounceRate}/>
      </div>
      <div className="grid g2" style={{marginTop:14}}>
        <div className="card"><h3>Nieuw tegen terugkerend</h3><Donut segments={[{label:"Nieuw",value:d.cur.newUsers},{label:"Terugkerend",value:returning}]}/></div>
        <div className="card"><h3>Landen</h3>
          <Table cols={[{label:"Land"},{label:"Sessies",num:true}]} data={d.countries} render={r=>[<td key="a">{r.name}</td>,<td key="b" className="num">{int(r.sessions)}</td>]}/>
        </div>
      </div>
    </div>
  );
}
function Marketing({d}){
  return (
    <div>
      <div className="grid g2">
        <div className="card"><h3>Kanalen</h3>
          <Table cols={[{label:"Kanaal"},{label:"Sessies",num:true},{label:"Gebr.",num:true},{label:"Betr.",num:true}]} data={d.channels}
            render={r=>[<td key="a">{r.name}</td>,<td key="b" className="num">{int(r.sessions)}</td>,<td key="c" className="num">{int(r.users)}</td>,<td key="d" className="num">{pct(r.eng)}</td>]}/>
        </div>
        <div className="card"><h3>Verdeling verkeer</h3><Donut segments={d.channels.slice(0,5).map(c=>({label:c.name,value:c.sessions}))}/></div>
      </div>
      <div className="card" style={{marginTop:14}}><h3>Campagnes</h3>
        {d.campaigns.filter(c=>c.name && c.name!=="(not set)").length
          ? <Table cols={[{label:"Campagne"},{label:"Sessies",num:true},{label:"Gebruikers",num:true}]} data={d.campaigns}
              render={r=>[<td key="a">{r.name}</td>,<td key="b" className="num">{int(r.sessions)}</td>,<td key="c" className="num">{int(r.users)}</td>]}/>
          : <div className="note">Geen campagnedata in deze periode. Campagnes verschijnen zodra er verkeer met utm-tags of gekoppelde advertenties binnenkomt.</div>}
      </div>
    </div>
  );
}
function Web({d}){
  const tot=d.devices.reduce((a,x)=>a+x.sessions,0)||1;
  return (
    <div>
      <div className="grid g4">
        <Scorecard label="Weergaven" value={int(d.cur.views)} cur={d.cur.views} prev={d.prev.views}/>
        <Scorecard label="Weerg. per sessie" value={(d.cur.views/(d.cur.sessions||1)).toFixed(1).replace(".",",")} cur={d.cur.views/(d.cur.sessions||1)} prev={d.prev.views/(d.prev.sessions||1)}/>
        <Scorecard label="Gem. sessieduur" value={dur(d.cur.avgDur)} cur={d.cur.avgDur} prev={d.prev.avgDur}/>
        <Scorecard label="Mobiel aandeel" value={pct((d.devices.find(x=>x.name==="mobile")||{sessions:0}).sessions/tot)} cur={0} prev={0}/>
      </div>
      <div className="grid g2" style={{marginTop:14}}>
        <div className="card"><h3>Top pagina's</h3>
          <Table cols={[{label:"Pagina"},{label:"Weergaven",num:true}]} data={d.pages} render={r=>[<td key="a" style={{maxWidth:260,overflow:"hidden",textOverflow:"ellipsis"}}>{r.path}</td>,<td key="b" className="num">{int(r.views)}</td>]}/>
        </div>
        <div className="card"><h3>Apparaten</h3><Donut segments={d.devices.map(x=>({label:x.name,value:x.sessions}))}/></div>
      </div>
    </div>
  );
}

/* ---------- Trends ---------- */
function Trends({d,client}){
  return (
    <div>
      <div className="grid g2">
        <div className="card"><h3>Zoekvolumes</h3>
          <div className="note">Nog niet gekoppeld. Deze sectie toont het zoekvolume rond de merk, en categorie-termen van {client.name}. Koppel hiervoor een bron zoals Google Trends of een SEO-tool via een extra endpoint. Ik zet dit voor je klaar zodra je een bron kiest.</div>
        </div>
        <div className="card"><h3>Reddit top posts</h3>
          <div className="note">Nog niet gekoppeld. Hier komen de best scorende Reddit-posts rond relevante onderwerpen, via Apify (reddit-scraper). Lever je een Apify-token als env var, dan haal ik ze live op net als in Waryte.</div>
        </div>
      </div>
      <div className="card" style={{marginTop:14}}><h3>Waarom deze tab</h3>
        <p style={{fontSize:14,lineHeight:1.6,margin:0,color:"var(--mist)"}}>Trends kijkt naar buiten: waar praat de markt over en wat zoeken mensen, los van je eigen site. Zo zie je vraag ontstaan voordat die in je Analytics zichtbaar wordt.</p>
      </div>
    </div>
  );
}

/* ---------- Models ---------- */
function Models({d,days}){
  const [target,setTarget]=useState(()=>{ const v=localStorage.getItem("pos_target_sessions"); return v?Number(v):0; });
  useEffect(()=>{ localStorage.setItem("pos_target_sessions",String(target)); },[target]);
  const f=forecast(d.trend,days);
  const pacePct= target? Math.min(999,(d.cur.sessions/target)*100):0;
  return (
    <div>
      <div className="grid g3">
        <div className="card sc"><div className="lab">Sessies deze periode</div><div className="val">{int(d.cur.sessions)}</div><div className="delta flat">{days} dagen</div></div>
        <div className="card sc"><div className="lab">Prognose volgende periode</div><div className="val">{f?int(f.proj):"-"}</div><div className={"delta "+(f&&f.dir==="stijgend"?"up":f&&f.dir==="dalend"?"down":"flat")}>{f?f.dir:"te weinig data"}</div></div>
        <div className="card sc"><div className="lab">Voortgang naar target</div><div className="val">{target?Math.round(pacePct)+"%":"-"}</div><div className="delta flat">{target?int(d.cur.sessions)+" van "+int(target):"stel een target in"}</div></div>
      </div>
      <div className="card" style={{marginTop:14}}><h3>Target instellen</h3>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <div className="field"><label>Doel sessies (periode)</label><input type="number" value={target||""} onChange={e=>setTarget(Number(e.target.value)||0)} placeholder="bijv. 5000"/></div>
          {target>0 && <div style={{flex:1,minWidth:180}}><div className="bar"><span className="bl">Voortgang</span><span className="bt"><span className="bf" style={{width:Math.min(100,pacePct)+"%"}}/></span><span className="bv">{Math.round(pacePct)}%</span></div></div>}
        </div>
      </div>
      <div className="card" style={{marginTop:14}}><h3>Sessies met prognoselijn</h3>
        <Line series={[{data:d.trend.map(t=>t.sessions)}]}/>
        <p style={{fontSize:12.5,color:"var(--mist)",marginTop:8}}>De prognose is een lineaire projectie op basis van het dagelijkse verloop in deze periode. Bedoeld als richting, niet als garantie.</p>
      </div>
    </div>
  );
}

/* ---------- Insights ---------- */
function Insights({d,client,rg,range}){
  const [status,setStatus]=useState("idle");
  const [report,setReport]=useState("");
  const [noKey,setNoKey]=useState(false);
  const opts=useMemo(()=>optimizations(d),[d]);

  function facts(){
    const top=d.channels.slice(0,5).map(c=>c.name+": "+int(c.sessions)+" sessies").join("; ");
    const half=Math.floor(d.trend.length/2), sum=a=>a.reduce((x,y)=>x+y.sessions,0);
    const dir= sum(d.trend.slice(half))>sum(d.trend.slice(0,half))?"stijgend":sum(d.trend.slice(half))<sum(d.trend.slice(0,half))?"dalend":"vlak";
    return "Periode: "+rg.cur.startDate+" tot "+rg.cur.endDate+". Sessies: "+int(d.cur.sessions)+" (vorige periode "+int(d.prev.sessions)+"). Gebruikers: "+int(d.cur.users)+", waarvan nieuw "+int(d.cur.newUsers)+". Paginaweergaven: "+int(d.cur.views)+". Gemiddelde sessieduur: "+dur(d.cur.avgDur)+". Betrokkenheid: "+pct(d.cur.engRate)+". Bounce rate: "+pct(d.cur.bounceRate)+". Top kanalen: "+(top||"geen")+". Trend sessies: "+dir+".";
  }
  async function writeReport(){
    setStatus("loading"); setReport(""); setNoKey(false);
    try{
      const res=await fetch("/api/report",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({facts:facts(),type:"Maandrapport",client:client.name})});
      const j=await res.json();
      if(j.ok===false && j.reason==="no_key"){ setNoKey(true); setStatus("done"); return; }
      if(j.ok===false) throw new Error(j.error||"API fout");
      setReport(j.text||""); setStatus("done");
    }catch(e){ setReport("Kon het rapport niet schrijven: "+(e.message||"")); setStatus("done"); }
  }
  function copy(){ navigator.clipboard.writeText(report); }

  return (
    <div>
      <div className="card"><h3>Business insights</h3>
        <p style={{fontSize:14.5,lineHeight:1.6,margin:0}}>
          In deze periode {d.cur.sessions>=d.prev.sessions?"steeg":"daalde"} het verkeer naar {int(d.cur.sessions)} sessies
          ({delta(d.cur.sessions,d.prev.sessions).t||"geen vergelijking"} tegenover de vorige periode).
          Het grootste kanaal is {d.channels[0]?d.channels[0].name:"onbekend"}.
          De betrokkenheid ligt op {pct(d.cur.engRate)}.
        </p>
      </div>

      <div className="card" style={{marginTop:14}}><h3>Optimalisatielijst</h3>
        {opts.map((o,i)=><div className="opt" key={i}><span className="mk"/><span style={{fontSize:14,lineHeight:1.5}}>{o}</span></div>)}
      </div>

      <div className="card" style={{marginTop:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:10}}>
          <h3 style={{margin:0}}>Maandrapport</h3>
          <div style={{display:"flex",gap:8}}>
            {report && <button className="btn ghost" onClick={copy}>Kopieer</button>}
            <button className="btn" onClick={writeReport} disabled={status==="loading"}>{status==="loading"?"Schrijven...":"Genereer rapport"}</button>
          </div>
        </div>
        {noKey && <div className="note">Het schrijven staat uit. Zet de env var ANTHROPIC_API_KEY in Vercel om automatische rapporten aan te zetten. De cijfers en de optimalisatielijst hierboven werken sowieso.</div>}
        {report && <div className="pre">{report}</div>}
        {!report && !noKey && status!=="loading" && <p style={{fontSize:13.5,color:"var(--mist)",margin:0}}>Klik op genereren voor een geschreven rapport op basis van bovenstaande cijfers.</p>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
